# ── API subdomain — proxies bare backend paths (mobile app + REACT_APP_API_URL) ─
# Matches deploy.sh / .env.example's REACT_APP_API_URL=https://api.portaltrial.in.
# Requires a DNS "A" record for api.portaltrial.in pointing at this server's IP
# before this block will do anything (it doesn't create the DNS record itself).
server {
    listen 80;
    server_name api.portaltrial.in;

    location / {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

server {
    listen 80;
    server_name portaltrial.in www.portaltrial.in;  # ← replace with your domain or EC2 public IP

    # ── Serve React build ───────────────────────────────────────────────────
    root /var/www/portal/frontend-app/build;
    index index.html;

    # React router — all unknown paths return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy API requests to FastAPI backend ───────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Health check passthrough ─────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Gzip for React bundle
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
